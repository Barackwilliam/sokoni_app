name: sokoni_app
description: Sokoni - Pata biashara karibu yako (Mafundi, Maduka, Beauty, Restaurant)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.5
  firebase_storage: ^11.6.6

  # Maps & location
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  geocoding: ^2.2.0

  # UI / utils
  url_launcher: ^6.2.5      # call & whatsapp
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  pin_code_fields: ^8.0.1   # OTP input
  google_fonts: ^6.2.0
  flutter_rating_bar: ^4.0.1
  provider: ^6.1.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
