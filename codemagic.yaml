workflows:
  android-release:
    name: Sokoni Android Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      # android_signing:
      #   - sokoni_keystore   
      flutter: stable
      java: 17
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Analyze
        script: flutter analyze
      - name: Test
        script: flutter test
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk